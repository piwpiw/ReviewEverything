name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"
  NPM_INSTALL_FLAGS: "--no-audit --no-fund --prefer-offline"

jobs:
  scope:
    runs-on: ubuntu-latest
    outputs:
      has_non_docs: ${{ steps.scope.outputs.has_non_docs }}
      is_fast_path: ${{ steps.scope.outputs.is_fast_path }}
      scope: ${{ steps.scope.outputs.scope }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect change scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.before }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          fi

          if [ -z "${BASE_SHA}" ] || [ "${BASE_SHA}" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA=$(git rev-parse HEAD~1)
          fi

          git fetch --depth=1 origin "${BASE_SHA}" || true

          CHANGED_FILES=$(git diff --name-only "${BASE_SHA}" "${GITHUB_SHA}")
          if [ -z "${CHANGED_FILES}" ]; then
            echo "has_non_docs=true" >> "${GITHUB_OUTPUT}"
            echo "is_fast_path=false" >> "${GITHUB_OUTPUT}"
            echo "scope=full" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          HAS_NON_DOCS=false
          DOCS_ONLY=true

          while IFS= read -r file; do
            if [ -z "${file}" ]; then
              continue
            fi
            case "${file}" in
              apps/web/docs/* | *.md)
                ;;
              apps/web/app/* | apps/web/components/* | apps/web/styles/* | apps/web/public/* | apps/web/lib/*)
                DOCS_ONLY=false
                ;;
              *)
                HAS_NON_DOCS=true
                DOCS_ONLY=false
                ;;
            esac

            if [ "${HAS_NON_DOCS}" = "true" ]; then
              break
            fi
          done <<< "${CHANGED_FILES}"

          if [ "${DOCS_ONLY}" = "true" ]; then
            echo "has_non_docs=false" >> "${GITHUB_OUTPUT}"
            echo "is_fast_path=false" >> "${GITHUB_OUTPUT}"
            echo "scope=docs" >> "${GITHUB_OUTPUT}"
          elif [ "${HAS_NON_DOCS}" = "true" ]; then
            echo "has_non_docs=true" >> "${GITHUB_OUTPUT}"
            echo "is_fast_path=false" >> "${GITHUB_OUTPUT}"
            echo "scope=full" >> "${GITHUB_OUTPUT}"
          else
            echo "has_non_docs=true" >> "${GITHUB_OUTPUT}"
            echo "is_fast_path=true" >> "${GITHUB_OUTPUT}"
            echo "scope=fast" >> "${GITHUB_OUTPUT}"
          fi

  lint:
    needs: scope
    if: needs.scope.outputs.has_non_docs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Lint gate
        run: |
          mkdir -p reports
          npm run lint:ci

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-lint
          path: apps/web/reports/eslint.json
          if-no-files-found: ignore
          retention-days: 14

  typecheck:
    needs: scope
    if: needs.scope.outputs.has_non_docs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Typecheck gate
        run: |
          mkdir -p reports
          set -o pipefail
          npm run typecheck 2>&1 | tee reports/typecheck.txt

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-typecheck
          path: apps/web/reports/typecheck.txt
          if-no-files-found: ignore
          retention-days: 14

  smoke:
    needs: scope
    if: needs.scope.outputs.has_non_docs == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Smoke gate
        run: |
          mkdir -p reports
          set -o pipefail
          npm run smoke:ci 2>&1 | tee reports/smoke_output.txt

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-smoke
          path: |
            apps/web/reports/smoke.json
            apps/web/reports/smoke_output.txt
          if-no-files-found: ignore
          retention-days: 14

  test:
    needs: scope
    if: needs.scope.outputs.has_non_docs == 'true' && needs.scope.outputs.is_fast_path == 'false'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci ${{ env.NPM_INSTALL_FLAGS }}

      - name: Test gate
        run: |
          mkdir -p reports
          set -o pipefail
          npm run test:ci | tee reports/test_output.txt

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-test
          path: apps/web/reports/test_output.txt
          if-no-files-found: ignore
          retention-days: 14

  api_contract:
    needs: scope
    if: needs.scope.outputs.has_non_docs == 'true' && needs.scope.outputs.is_fast_path == 'false'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: API contract audit gate
        run: |
          mkdir -p reports
          node scripts/api-contract-audit.js

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-api-contract
          path: apps/web/reports/api-contract-audit.md
          if-no-files-found: ignore
          retention-days: 14

  api_sync:
    needs: scope
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: API sync drift audit gate
        run: |
          mkdir -p reports
          node scripts/api-contract-sync-audit.js

      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports-api-sync
          path: apps/web/reports/api-contract-sync-audit.md
          if-no-files-found: ignore
          retention-days: 14

  summary:
    needs: [scope, lint, typecheck, smoke, test, api_contract, api_sync]
    if: always()
    permissions:
      contents: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download gate reports
        uses: actions/download-artifact@v4
        with:
          pattern: ci-reports-*
          path: apps/web/reports
          merge-multiple: true

      - name: Build CI summary
        if: needs.scope.outputs.has_non_docs == 'true'
        run: |
          mkdir -p reports
          node scripts/ci/summarize-failures.js
          if [ -f reports/ci-summary.md ]; then
            cat reports/ci-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Docs-only summary
        if: needs.scope.outputs.has_non_docs != 'true'
        run: |
          mkdir -p reports
          API_SYNC_RESULT="MISSING"
          if [ -f reports/api-contract-sync-audit.md ]; then
            API_SYNC_RESULT=$(node -e "const fs=require('fs');const text=fs.readFileSync('reports/api-contract-sync-audit.md','utf8');const m=text.match(/Result:\\s*(PASS|FAIL)/i);process.stdout.write(m?m[1].toUpperCase():'UNKNOWN')")
          fi
          echo "Docs-only changes detected. Lint/typecheck/test/api-smoke gates are skipped for faster deployment cycle." >> "$GITHUB_STEP_SUMMARY"
          echo "- API sync drift: ${API_SYNC_RESULT}" >> "$GITHUB_STEP_SUMMARY"
          cat <<EOF > reports/ci-summary.md
          # CI Summary
          - Scope: docs-only
          - Gates skipped: lint, typecheck, test, api:contract-audit, smoke
          - API sync drift: ${API_SYNC_RESULT}
          EOF

      - name: Comment PR with failures
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ci-gate-summary -->';
            const summaryPath = 'apps/web/reports/ci-summary.md';
            if (!fs.existsSync(summaryPath)) return;

            const body = `${marker}\n${fs.readFileSync(summaryPath, 'utf8')}`;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const botComment = comments.find(
              (c) => c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Upload merged CI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-ci-reports
          path: apps/web/reports
          retention-days: 14

  enforce:
    needs: [scope, lint, typecheck, smoke, test, api_contract, api_sync, summary]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Enforce gate outcomes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ needs.scope.outputs.has_non_docs }}" != "true" ]; then
            if [ "${{ needs.api_sync.result }}" != "success" ]; then
              echo "Docs-only scope but API sync audit failed."
              exit 1
            fi
            echo "Docs-only scope: API sync audit passed."
            exit 0
          fi

          if [ "${{ needs.scope.outputs.is_fast_path }}" == "true" ]; then
            if [ "${{ needs.lint.result }}" != "success" ] || \
               [ "${{ needs.typecheck.result }}" != "success" ] || \
               [ "${{ needs.smoke.result }}" != "success" ] || \
               [ "${{ needs.api_sync.result }}" != "success" ]; then
              echo "Fast path gates failed."
              exit 1
            fi
            echo "Fast path gates passed."
            exit 0
          fi

          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.api_contract.result }}" != "success" ] || \
             [ "${{ needs.smoke.result }}" != "success" ] || \
             [ "${{ needs.api_sync.result }}" != "success" ]; then
            echo "One or more full-path quality gates failed."
            exit 1
          fi

          echo "Full-path quality gates passed."

  open_issue:
    needs: enforce
    if: needs.enforce.result == 'failure' && github.event_name != 'pull_request'
    permissions:
      contents: read
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Download CI reports
        uses: actions/download-artifact@v4
        with:
          name: web-ci-reports
          path: artifacts
          merge-multiple: true
          if-no-files-found: ignore

      - name: Open issue on CI failure
        uses: actions/github-script@v7
        with:
          script: |
            const title = `CI Failure: ${context.repo.owner}/${context.repo.repo} ${context.sha}`;
            const fs = require("node:fs");
            const path = "artifacts/ci-summary.md";
            const repoBaseUrl = context.payload.repository.html_url;
            const summary = fs.existsSync(path)
              ? fs.readFileSync(path, "utf8").trim()
              : "CI summary file unavailable.";
            const snippet = summary
              .split(/\r?\n/)
              .filter((line) => line.trim())
              .slice(0, 40)
              .join("\n");
            const gateSummary = [
              "lint: ${{ needs.lint.result }}",
              "typecheck: ${{ needs.typecheck.result }}",
              "smoke: ${{ needs.smoke.result }}",
              "test: ${{ needs.test.result }}",
              "api_contract: ${{ needs.api_contract.result }}",
              "api_sync: ${{ needs.api_sync.result }}",
              "scope: ${{ needs.scope.outputs.scope }}",
            ].join("\n- ");

            const { data: issues } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open "${title}" in:title`
            });

            const existingIssue = issues.items.find((issue) => issue.title === title && issue.state === "open");
            if (existingIssue) {
              core.info(`Updating existing issue: ${existingIssue.html_url}`);
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existingIssue.number,
                body: `CI gates failed on commit ${context.sha}.\n\n### CI summary (top)\n\n\`\`\`\n${snippet}\n\`\`\`\n\n### Gate status\n- ${gateSummary}\n\n### Run details\n- commit: ${repoBaseUrl}/commit/${context.sha}\n- workflow run: ${repoBaseUrl}/actions/runs/${context.runId}\n\nSee artifact: \`web-ci-reports\``,
              });
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `CI gates failed on commit ${context.sha}.\n\n### CI summary (top)\n\n\`\`\`\n${snippet}\n\`\`\`\n\n### Gate status\n- ${gateSummary}\n\n### Run details\n- commit: ${repoBaseUrl}/commit/${context.sha}\n- workflow run: ${repoBaseUrl}/actions/runs/${context.runId}\n\nSee artifact: \`web-ci-reports\``,
              labels: ['ci-failure', 'automated'],
            });
