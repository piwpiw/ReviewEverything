name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prepare reports directory
        run: mkdir -p reports

      - name: Lint gate
        id: lint
        continue-on-error: true
        run: npm run lint:ci

      - name: Typecheck gate
        id: typecheck
        continue-on-error: true
        run: |
          set -o pipefail
          npm run typecheck 2>&1 | tee reports/typecheck.txt

      - name: Test gate
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          npm run test:ci | tee reports/test_output.txt

      - name: Smoke gate
        id: smoke
        continue-on-error: true
        run: |
          set -o pipefail
          npm run smoke:ci 2>&1 | tee reports/smoke_output.txt

      - name: Build CI summary
        if: always()
        run: |
          node scripts/ci/summarize-failures.js
          cat reports/ci-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Comment PR with failures
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- ci-gate-summary -->';
            const summaryPath = 'apps/web/reports/ci-summary.md';
            if (!fs.existsSync(summaryPath)) return;

            const body = `${marker}\n${fs.readFileSync(summaryPath, 'utf8')}`;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            const botComment = comments.find(
              (c) => c.user.type === 'Bot' && c.body && c.body.includes(marker)
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Enforce gate outcomes
        if: always()
        run: |
          if [[ "${{ steps.lint.outcome }}" != "success" || "${{ steps.typecheck.outcome }}" != "success" || "${{ steps.test.outcome }}" != "success" || "${{ steps.smoke.outcome }}" != "success" ]]; then
            echo "One or more quality gates failed."
            exit 1
          fi

      - name: Open issue on failure (push only)
        if: failure() && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `CI Failure: ${context.repo.owner}/${context.repo.repo} ${context.sha}`;
            const { data: issues } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open "${title}" in:title`
            });

            if (issues.total_count > 0) {
              core.info(`Existing issue found: ${issues.items[0].html_url}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `CI gates failed on commit ${context.sha}.\n\nSee artifact: \`web-ci-reports\``,
              labels: ['ci-failure', 'automated'],
            });

      - name: Upload CI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-ci-reports
          path: apps/web/reports
          retention-days: 14
